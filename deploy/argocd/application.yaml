apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: twitter-clone
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/twitter-learn-cloud-development/backend-services.git
    targetRevision: main
    path: deploy/helm/twitter-clone
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
