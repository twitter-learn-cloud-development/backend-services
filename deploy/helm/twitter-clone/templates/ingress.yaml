apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "twitter.fullname" . }}-ingress
  labels:
    {{- include "twitter.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    # Default Nginx annotations
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "twitter.fullname" $ }}-gateway
                port:
                  number: {{ $.Values.services.gateway.service.port }}
          {{- end }}
    {{- end }}
