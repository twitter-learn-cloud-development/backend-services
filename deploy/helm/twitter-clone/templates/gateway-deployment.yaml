apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "twitter.fullname" . }}-gateway
  labels:
    {{- include "twitter.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  replicas: {{ .Values.services.gateway.replicaCount }}
  selector:
    matchLabels:
      {{- include "twitter.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        {{- include "twitter.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: gateway
    spec:
      containers:
        - name: gateway
          image: "{{ .Values.services.gateway.image.repository }}:{{ .Values.services.gateway.image.tag }}"
          imagePullPolicy: {{ .Values.services.gateway.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.services.gateway.service.port }}
              protocol: TCP
          env:
            - name: GATEWAY_PORT
              value: {{ .Values.services.gateway.env.GATEWAY_PORT | quote }}
              # Note: In K8s, we use DNS for service discovery, but if the app reads from Consul,
              # we should point it to Consul. 
              # HOWEVER, your gateway config currently relies on variables like USER_SERVICE_ADDR 
              # OR uses Consul discovery. 
              # If your code uses Consul for discovery, we point it to Consul.
              # If it uses direct ENV vars (as seen in docker-compose for some fallback), we can set them to K8s DNS.
              # Based on docker-compose, it seems to pass SERVICE_ADDRs. 
              # Let's assume Consul discovery is primary but we can also provide DNS names.
            - name: USER_SERVICE_ADDR
              value: "{{ include "twitter.fullname" . }}-user:{{ .Values.services.userService.containerPort }}"
            - name: TWEET_SERVICE_ADDR
              value: "{{ include "twitter.fullname" . }}-tweet:{{ .Values.services.tweetService.containerPort }}"
            - name: FOLLOW_SERVICE_ADDR
              value: "{{ include "twitter.fullname" . }}-follow:{{ .Values.services.followService.containerPort }}"
            - name: REDIS_HOST
              value: {{ include "twitter.redis.host" . }}
            - name: REDIS_PORT
              value: "6379"
            - name: CONSUL_HOST
              value: {{ include "twitter.consul.host" . }}
            - name: CONSUL_PORT
              value: "8500"
            - name: JAEGER_AGENT_HOST
              value: {{ include "twitter.jaeger.host" . }}
            - name: JAEGER_SAMPLER_TYPE
              value: "const"
            - name: JAEGER_SAMPLER_PARAM
              value: "1"
          resources:
            {{- toYaml .Values.services.gateway.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "twitter.fullname" . }}-gateway
  labels:
    {{- include "twitter.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  type: {{ .Values.services.gateway.service.type }}
  ports:
    - port: {{ .Values.services.gateway.service.port }}
      targetPort: http
      protocol: TCP
      name: http
      {{- if eq .Values.services.gateway.service.type "NodePort" }}
      nodePort: {{ .Values.services.gateway.service.nodePort }}
      {{- end }}
  selector:
    {{- include "twitter.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
