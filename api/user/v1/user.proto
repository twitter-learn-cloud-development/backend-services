syntax = "proto3";

package user.v1;

option go_package = "twitter-clone/api/user/v1;userv1";

// UserService 用户服务
service UserService {
  // Register 用户注册
  rpc Register(RegisterRequest) returns (RegisterResponse);

  // Login 用户登录
  rpc Login(LoginRequest) returns (LoginResponse);

  // GetProfile 获取用户资料
  rpc GetProfile(GetProfileRequest) returns (GetProfileResponse);

  // UpdateProfile 更新用户资料
  rpc UpdateProfile(UpdateProfileRequest) returns (UpdateProfileResponse);

  // ChangePassword 修改密码
  rpc ChangePassword(ChangePasswordRequest) returns (ChangePasswordResponse);

  // GetBatchUsers 批量获取用户信息
  rpc GetBatchUsers(GetBatchUsersRequest) returns (GetBatchUsersResponse);

  // SearchUsers 搜索用户
  rpc SearchUsers(SearchUsersRequest) returns (SearchUsersResponse);
}

// ==================== 消息定义 ====================

// User 用户
message User {
  uint64 id = 1;
  string username = 2;
  string email = 3;
  string avatar = 4;
  string bio = 5;
  int64 created_at = 6;
  int64 updated_at = 7;
  string cover_url = 8;
  string website = 9;
  string location = 10;
}

// ==================== Register ====================

message RegisterRequest {
  string username = 1;
  string email = 2;
  string password = 3;
}

message RegisterResponse {
  User user = 1;
}

// ==================== Login ====================

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string token = 1;
  User user = 2;
}

// ==================== GetProfile ====================

message GetProfileRequest {
  uint64 user_id = 1;
}

message GetProfileResponse {
  User user = 1;
}

// ==================== UpdateProfile ====================

message UpdateProfileRequest {
  uint64 user_id = 1;
  string avatar = 2;
  string bio = 3;
  string cover_url = 4;
  string website = 5;
  string location = 6;
}

message UpdateProfileResponse {
  User user = 1;
}

// ==================== ChangePassword ====================

message ChangePasswordRequest {
  uint64 user_id = 1;
  string old_password = 2;
  string new_password = 3;
}

message ChangePasswordResponse {
  string message = 1;
}

// ==================== GetBatchUsers ====================

message GetBatchUsersRequest {
  repeated uint64 user_ids = 1;
}

message GetBatchUsersResponse {
  repeated User users = 1;
}

// ==================== SearchUsers ====================

message SearchUsersRequest {
  string keyword = 1;
  uint64 cursor = 2; // 分页游标
  int32 limit = 3;   // 每页数量
}

message SearchUsersResponse {
  repeated User users = 1;
  uint64 next_cursor = 2;
  bool has_more = 3;
}