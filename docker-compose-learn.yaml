version: '3.8'  #设置docker版本，不同版本有不同语法规则，然后就是如果不设置就默认lastest，现在大家一般都是不写默认使用最新版，写这个只是程序员习惯。

services:  #开始搭建服务
  # === 基础设施 ===
  mysql:    #mysql服务
    image: mysql:8.0    #这个很重要，他是会决定我们到时候构造镜像时拉取镜像是什么，如果你自己构建的本地镜像可以换成本地镜像名字，没有的话，他会按照这个去docker hub中拉取镜像。
    environment:        #环境变量，硬编码，直接使用.env，会映射过来的，注意${变量名}。
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}     #数据库密码
      MYSQL_DATABASE: twitter                 #数据库名字
    ports:
      - "3307:3306"    #端口映射，左边是本机端口，右边是docker内部端口，我们电脑外界是与docker的mysql通过3307端口通信的，然后docker内部服务是通过3306进行的通信。
    volumes:
      - mysql_data:/var/lib/mysql     #数据卷，这里是存储数据库数据的文件位置，左边是文件名称，右边是目录路径。
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]     #这个是用来在服务构建后，在cmd中运行mysqladmin ping -h localhost指令，来实现健康检查的功效。
      interval: 5s   #每5s检查一次
      timeout: 5s    #5s未响应就超时，重新进行检查
      retries: 10    #一共检查10次

  redis:
    image: redis:alpine   #redis镜像名称
    ports:
      - "6379:6379"      #主机端口号/端口号
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 10

  consul:
    image: consul:1.15
    command: "agent -dev -client=0.0.0.0"
    ports:
      - "8500:8500"
      - "8600:8600/udp"

  jaeger:
    image: jaegertracing/all-in-one:1.37
    ports:
      - "16686:16686"
      - "6831:6831/udp"
    environment:
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
      - COLLECTOR_OTLP_ENABLED=true
      - COLLECTOR_OTLP_ENABLED=true

  prometheus:
    image: prom/prometheus:v2.45.0
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'

  grafana:
    image: grafana/grafana:10.0.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
  user-service:
    build:
      context: .
      dockerfile: deploy/docker/user.dockerfile
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=twitter
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CONSUL_HOST=consul
      - CONSUL_PORT=8500
      - SERVICE_NAME=user-service
      - SERVICE_ADDR=user-service
      - SERVICE_PORT=9091
      - JAEGER_AGENT_HOST=jaeger
      - JAEGER_SAMPLER_TYPE=const
      - JAEGER_SAMPLER_PARAM=1
      - JAEGER_COLLECTOR_ENDPOINT=http://jaeger:14268/api/traces
      - JWT_SECRET=twitter_clone_secret_key_2023
    # ports:
    #   - "9091:9091"
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  tweet-service:
    build:
      context: .
      dockerfile: deploy/docker/tweet.dockerfile
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=twitter
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MQ_HOST=rabbitmq
      - MQ_PORT=5672
      - MQ_USER=guest
      - MQ_PASSWORD=guest
      - CONSUL_HOST=consul
      - CONSUL_PORT=8500
      - SERVICE_NAME=tweet-service
      - SERVICE_ADDR=tweet-service
      - SERVICE_PORT=9092
      - JAEGER_AGENT_HOST=jaeger
      - JAEGER_SAMPLER_TYPE=const
      - JAEGER_SAMPLER_PARAM=1
      - JAEGER_COLLECTOR_ENDPOINT=http://jaeger:14268/api/traces
    # ports:
    #   - "9092:9092"
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  follow-service:
    build:
      context: .
      dockerfile: deploy/docker/follow.dockerfile
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=twitter
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MQ_HOST=rabbitmq
      - MQ_PORT=5672
      - MQ_USER=guest
      - MQ_PASSWORD=guest
      - CONSUL_HOST=consul
      - CONSUL_PORT=8500
      - SERVICE_NAME=follow-service
      - SERVICE_ADDR=follow-service
      - SERVICE_PORT=9093
      - JAEGER_AGENT_HOST=jaeger
      - JAEGER_SAMPLER_TYPE=const
      - JAEGER_SAMPLER_PARAM=1
      - JAEGER_COLLECTOR_ENDPOINT=http://jaeger:14268/api/traces
    # ports:
    #   - "9093:9093"
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # === 消费者 ===
  consumer:
    build:
      context: .
      dockerfile: deploy/docker/consumer.dockerfile
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=twitter
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MQ_HOST=rabbitmq
      - MQ_PORT=5672
      - MQ_USER=guest
      - MQ_PASSWORD=guest
      - JAEGER_AGENT_HOST=jaeger
      - JAEGER_SAMPLER_TYPE=const
      - JAEGER_SAMPLER_PARAM=1
      - JAEGER_COLLECTOR_ENDPOINT=http://jaeger:14268/api/traces
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # === 网关 ===
  gateway:
    build:
      context: .
      dockerfile: deploy/docker/gateway.dockerfile
    environment:
      - GATEWAY_PORT=9638
      - USER_SERVICE_ADDR=user-service:9091
      - TWEET_SERVICE_ADDR=tweet-service:9092
      - FOLLOW_SERVICE_ADDR=follow-service:9093
      - MESSENGER_SERVICE_ADDR=messenger-service:9094
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=twitter
      - CONSUL_HOST=consul
      - CONSUL_PORT=8500
      - JAEGER_AGENT_HOST=jaeger
      - JAEGER_SAMPLER_TYPE=const
      - JAEGER_SAMPLER_PARAM=1
      - JAEGER_COLLECTOR_ENDPOINT=http://jaeger:14268/api/traces
      - JWT_SECRET=twitter_clone_secret_key_2023
    ports:
      - "9638:9638"
    restart: on-failure
    depends_on:
      - user-service
      - tweet-service
      - follow-service
      - notification-service
    volumes:
      - ./uploads:/app/uploads

  notification-service:
    build:
      context: .
      dockerfile: deploy/docker/notification.dockerfile
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=twitter
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MQ_HOST=rabbitmq
      - MQ_PORT=5672
      - MQ_USER=guest
      - MQ_PASSWORD=guest
      - CONSUL_HOST=consul
      - CONSUL_PORT=8500
      - SERVICE_NAME=notification-service
      - JAEGER_AGENT_HOST=jaeger
      - JAEGER_SAMPLER_TYPE=const
      - JAEGER_SAMPLER_PARAM=1
      - JAEGER_COLLECTOR_ENDPOINT=http://jaeger:14268/api/traces
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  messenger-service:
    build:
      context: .
      dockerfile: deploy/docker/messenger.dockerfile
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=twitter
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CONSUL_HOST=consul
      - CONSUL_PORT=8500
      - SERVICE_NAME=messenger-service
      - SERVICE_ADDR=messenger-service
      - SERVICE_PORT=9094
      - JAEGER_AGENT_HOST=jaeger
      - JAEGER_SAMPLER_TYPE=const
      - JAEGER_SAMPLER_PARAM=1
      - JAEGER_COLLECTOR_ENDPOINT=http://jaeger:14268/api/traces
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Sentinel Dashboard
  sentinel:
    image: bladex/sentinel-dashboard
    ports:
      - "8858:8858"
    restart: always

volumes:
  mysql_data:
  prometheus_data:
