name: Twitter Clone CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. Test Job: Runs Go Unit Tests
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25.3'

      - name: Install dependencies
        run: go mod download

      - name: Run Tests
        run: go test ./... -v

  # 2. Build Job: Builds Docker Images (Only on Push to Main)
  build-and-push:
    name: Build Docker Images
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [user-service, tweet-service, follow-service, gateway, consumer]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        # NOTE: You must set DOCKER_USERNAME and DOCKER_PASSWORD in GitHub Repository Secrets
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push ${{ matrix.service }}
        uses: docker/build-push-action@v4
        with:
          context: .
          file: deploy/docker/${{ matrix.service == 'user-service' && 'user' || matrix.service == 'tweet-service' && 'tweet' || matrix.service == 'follow-service' && 'follow' || matrix.service }}.dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:latest
